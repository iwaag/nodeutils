# Optional host-local inventory hints.
#
# This file is read by `nodeutils collect`. It must not contain Nautobot API
# credentials or authoritative Nautobot classification such as final location,
# role, status, or tags. Those decisions belong to the central nauto ingestor.

# owner: "eiji"
# purpose: "desktop"
# description: "Local AI workstation"

# Stable service placement declarations for automation agents. These describe
# intended service roles and preferred endpoints. Live capacity should be
# checked through monitoring before dispatching work.
# service_roles:
#   - ai-inference
#
# preferred_services:
#   ollama:
#     service_role: ai-inference
#     preferred: true
#     endpoint: "http://pc1:11434"
#     startup_policy: use_existing_first
#     fallback_policy: start_new_if_capacity_available
#     managed_by: systemd

# Optional host-local service detection hints. These help normalize observed
# services reported by this host; they are not the cluster-wide desired service
# catalog. Keep desired services in nauto/seed/desired_services.yaml.
# service_probe_hints:
#   ollama:
#     endpoint: "http://pc1:11434"
#     healthcheck_path: /api/tags
#   hatchet:
#     endpoint: "http://pc1:8080"
#     systemd_unit: hatchet.service

# Set to false if you want the Docker raw inventory to omit the full sanitized
# container list and keep only counts, ports, compose projects, and important
# scheduler-facing services.
# include_all_docker_containers: true

# Proxmox VE inventory collection. In auto mode, Proxmox data is collected only
# when the script is running on a Proxmox host.
# proxmox:
#   enabled: auto
#   include_guest_interfaces: true
#   include_guest_ips: true
